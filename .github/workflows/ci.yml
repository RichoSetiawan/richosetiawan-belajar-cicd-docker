# Nama workflow
name: Belajar CI/CD Pipeline

# Kapan workflow ini dijalankan?
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

# Apa yang harus dikerjakan?
jobs:
  contoh-job-pertama:
    # Menentukan sistem operasi server (runner) yang digunakan
    runs-on: ubuntu-latest
    
    # Langkah-langkah yang akan dieksekusi di dalam job ini
    steps:
      - name: Mengambil kode dari repositori (Checkout)
        uses: actions/checkout@v4
        
      - name: Menjalankan perintah terminal sederhana
        run: echo "Halo! Pipeline CI/CD pertamamu berhasil berjalan."

